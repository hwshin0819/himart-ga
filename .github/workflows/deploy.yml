name: GA4 Data Fetch & Deploy

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      period:
        description: 'Date range in days (7, 14, 30, 90 or all)'
        required: false
        default: 'all'

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Fetch GA4 data
        env:
          GA_CREDENTIALS: ${{ secrets.GA_CREDENTIALS }}
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
        run: node scripts/fetch-ga-data.js ${{ github.event.inputs.period || 'all' }}

      - name: Build React app
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
